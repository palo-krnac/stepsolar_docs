<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Solar panel -->
  <rect x="4" y="6" width="28" height="20" rx="2" fill="#1a2e1a" stroke="#3DD639" stroke-width="1.5"/>
  <!-- Panel grid lines -->
  <line x1="13" y1="6" x2="13" y2="26" stroke="#3DD639" stroke-width="0.5" opacity="0.6"/>
  <line x1="22" y1="6" x2="22" y2="26" stroke="#3DD639" stroke-width="0.5" opacity="0.6"/>
  <line x1="4" y1="13" x2="32" y2="13" stroke="#3DD639" stroke-width="0.5" opacity="0.6"/>
  <line x1="4" y1="20" x2="32" y2="20" stroke="#3DD639" stroke-width="0.5" opacity="0.6"/>
  <!-- Sun rays -->
  <circle cx="40" cy="12" r="4" fill="#3DD639" opacity="0.9"/>
  <line x1="40" y1="4" x2="40" y2="7" stroke="#3DD639" stroke-width="1.2"/>
  <line x1="40" y1="17" x2="40" y2="20" stroke="#3DD639" stroke-width="1.2"/>
  <line x1="32" y1="12" x2="35" y2="12" stroke="#3DD639" stroke-width="1.2"/>
  <line x1="45" y1="12" x2="48" y2="12" stroke="#3DD639" stroke-width="1.2"/>
  <line x1="34" y1="6" x2="36" y2="8" stroke="#3DD639" stroke-width="1.2"/>
  <line x1="44" y1="16" x2="46" y2="18" stroke="#3DD639" stroke-width="1.2"/>
  <!-- Boiler -->
  <rect x="10" y="30" width="14" height="14" rx="3" fill="#0f1a0f" stroke="#3DD639" stroke-width="1.5"/>
  <circle cx="17" cy="37" r="3" fill="none" stroke="#3DD639" stroke-width="1" opacity="0.7"/>
  <!-- Connection line -->
  <line x1="18" y1="26" x2="18" y2="30" stroke="#3DD639" stroke-width="1.5"/>
</svg>
